name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Build app
        run: npm run build
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Build SSG
        run: npm run build:ssg
      - name: Run Lighthouse CI
        run: |
          CHROME_PATH=$(find ~/.cache/ms-playwright/chromium-*/chrome-linux -name "chrome" -type f 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$CHROME_PATH" ]; then
            echo "::error::Chrome binary not found in Playwright cache"
            exit 1
          fi
          echo "Using Chrome at: $CHROME_PATH"
          export CHROME_PATH
          npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm_config_yes=true npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run Accessibility Audit
        run: |
          npm run preview &
          # Wait up to 30s for port 4173 to be ready
          timeout 30s bash -c 'until curl -s http://localhost:4173 > /dev/null; do sleep 1; done'
          npm run test:a11y
